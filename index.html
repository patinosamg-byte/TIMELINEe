<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santi y Rafa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Santi y Rafa TIMELINE ❤️</h1>
        <p>Mis impresiones en tiempo real</p>
    </header>

    <main class="timeline" id="timeline-container">
        </main>

    <div class="secret-trigger" onclick="handleAdminAccess()"></div>

    <section id="admin-panel">
        <div class="admin-content">
            <h3>Nuevo Recuerdo</h3>
            <div id="preview-container"></div>
            <label for="admin-file" class="file-label" id="label-archivo">📷 Seleccionar Foto</label>
            <input type="file" id="admin-file" accept="image/*" onchange="previsualizarFoto(this)">
            <textarea id="admin-msg" rows="3" placeholder="Escribe un mensaje..."></textarea>
            <button id="btn-publicar" onclick="publicarPost()">PUBLICAR</button>
            <button class="close-btn" onclick="closeAdmin()" style="background:none; color:gray; margin-top:10px; border:none;">Cancelar</button>
        </div>
    </section>

    <script type="module" src="script.js"></script>
</body>
</html>
